version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${HOST_PORT:-3002}:3000"
    volumes:
      # Mount the entire prisma directory to allow SQLite to create journal files safely
      - ./prisma:/app/prisma
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/prisma/dev.db
